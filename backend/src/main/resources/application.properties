# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# DataSource
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/municipal_db
spring.datasource.username=municipal_user
spring.datasource.password=municipal_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT
# ============================================================
jwt.secret=3f8a2b1c9d4e7f6a0b5c2d8e1f4a7b3c9d6e2f5a8b1c4d7e0f3a6b9c2d5e8f1a
jwt.expiration=86400000