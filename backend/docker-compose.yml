services:
  db:
    image: postgis/postgis:16-3.4
    container_name: municipal_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: municipal_db
      POSTGRES_USER: municipal_user
      POSTGRES_PASSWORD: municipal_pass
    ports:
      - "5432:5432"
    volumes:
      - municipal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U municipal_user -d municipal_db"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  municipal_db_data:
